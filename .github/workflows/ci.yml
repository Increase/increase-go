name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod

      - name: Lint
        run: ./scripts/lint

      - name: Test
        run: ./scripts/test
